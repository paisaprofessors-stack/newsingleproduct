<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Page</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; color: #222; }

    /* ── PREVIEW SECTION ── */
    .preview-section {
      max-width: 900px;
      margin: 32px auto 0;
      padding: 0 16px;
    }
    .preview-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Main large image display */
    .main-display {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-in;
      position: relative;
    }
    .main-display img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .main-display img:hover { transform: scale(1.04); }

    /* Thumbnail strip for preview images */
    .preview-thumbs {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .preview-thumbs img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.2s, transform 0.2s;
    }
    .preview-thumbs img:hover,
    .preview-thumbs img.active { border-color: #222; transform: scale(1.05); }

    /* ── MORE IMAGES SECTION ── */
    .more-section {
      max-width: 900px;
      margin: 32px auto 0;
      padding: 0 16px;
    }
    .more-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .more-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .more-grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      background: #fff;
    }
    .more-grid img:hover {
      transform: scale(1.04);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    /* ── REVIEWS SECTION ── */
    .reviews-section {
      max-width: 900px;
      margin: 40px auto 0;
      padding: 0 16px 48px;
    }
    .reviews-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .reviews-grid img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      object-fit: cover;
      background: #fff;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .reviews-grid img:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 18px rgba(0,0,0,0.13);
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 10px;
      object-fit: contain;
    }
    #lightbox-close {
      position: fixed;
      top: 18px; right: 24px;
      font-size: 2.2rem;
      color: #fff;
      cursor: pointer;
      z-index: 10000;
      line-height: 1;
    }

    /* Scrollbar style */
    .preview-thumbs::-webkit-scrollbar { height: 4px; }
    .preview-thumbs::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    @media (max-width: 600px) {
      .preview-thumbs img { width: 70px; height: 70px; }
      .more-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      .reviews-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     MAIN PREVIEW — 5 hero images
═══════════════════════════════════════════ -->
<section class="preview-section">
  <h2>Product Preview</h2>

  <!-- Big active image -->
  <div class="main-display" id="mainDisplay" onclick="openLightbox(this.querySelector('img').src)">
    <img id="mainImg" src="main front.png" alt="Main Preview" />
  </div>

  <!-- Thumbnail strip: main front, main back, front+back, front model 4, front model 5 -->
  <div class="preview-thumbs">
    <img src="main front.png"     alt="Main Front"      class="active" onclick="setMain(this, 'main front.png')" />
    <img src="main back.png"      alt="Main Back"               onclick="setMain(this, 'main back.png')" />
    <img src="front + back.png"   alt="Front + Back"            onclick="setMain(this, 'front + back.png')" />
    <img src="front model 4.png"  alt="Front Model 4"           onclick="setMain(this, 'front model 4.png')" />
    <img src="front model 5.png"  alt="Front Model 5"           onclick="setMain(this, 'front model 5.png')" />
  </div>
</section>

<!-- ═══════════════════════════════════════════
     MORE IMAGES — side by side grid
     (all except the 5 preview ones and reviews)
═══════════════════════════════════════════ -->
<section class="more-section">
  <h2>More Images</h2>
  <div class="more-grid">
    <img src="front model 1.png"  alt="Front Model 1"  onclick="openLightbox('front model 1.png')" />
    <img src="back model 1.png"   alt="Back Model 1"   onclick="openLightbox('back model 1.png')" />
    <img src="front model 2.png"  alt="Front Model 2"  onclick="openLightbox('front model 2.png')" />
    <img src="back model 2.png"   alt="Back Model 2"   onclick="openLightbox('back model 2.png')" />
    <img src="front model 3.png"  alt="Front Model 3"  onclick="openLightbox('front model 3.png')" />
    <img src="back model 3.png"   alt="Back Model 3"   onclick="openLightbox('back model 3.png')" />
  </div>
</section>

<!-- ═══════════════════════════════════════════
     REVIEWS SECTION
═══════════════════════════════════════════ -->
<section class="reviews-section">
  <h2>Customer Reviews</h2>
  <div class="reviews-grid">
    <img src="review 1.png" alt="Review 1" onclick="openLightbox('review 1.png')" />
    <img src="review 2.png" alt="Review 2" onclick="openLightbox('review 2.png')" />
    <img src="review 3.png" alt="Review 3" onclick="openLightbox('review 3.png')" />
  </div>
</section>

<!-- ═══════════════════════════════════════════
     LIGHTBOX
═══════════════════════════════════════════ -->
<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close" onclick="closeLightbox()">&#x2715;</span>
  <img id="lightbox-img" src="" alt="Enlarged view" onclick="event.stopPropagation()" />
</div>

<script>
  function setMain(thumb, src) {
    document.getElementById('mainImg').src = src;
    document.querySelectorAll('.preview-thumbs img').forEach(t => t.classList.remove('active'));
    thumb.classList.add('active');
  }

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>

</body>
</html>
